<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AviRec - 飞机拍摄记录{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">✈ AviRec</a>
        <div class="nav-links">
            <a href="/airlines">航司</a>
            <a href="/search">搜索</a>
            <a href="/profile">我的</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>AviRec v0.1 — 飞机拍摄记录器 | 数据来源：手动整理 + 社区贡献</p>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
